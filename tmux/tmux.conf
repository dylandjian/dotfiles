# True color support
set -g default-terminal "tmux-256color"
set -as terminal-features ",tmux-256color:RGB"

# Focus events (for autoread in nvim, etc.)
set -g focus-events on

# Automatically set window title to "foldername > process"
set-option -g automatic-rename on
set-option -g automatic-rename-format '#{b:pane_current_path} > #{pane_current_command}'

# Moving between panes
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Re-bind last window command
bind b last-window

# Pane resizing
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# New window / splits keep current path
bind c new-window -c "#{pane_current_path}"
bind \\ split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Kill pane
bind q killp

# Reload config
bind r source-file ~/.config/tmux/tmux.conf \; display "Reloaded"

# Vimlike copy mode
unbind [
bind Escape copy-mode
unbind p
bind p paste-buffer
bind-key -T copy-mode-vi 'v' send-keys -X begin-selection
bind-key -T copy-mode-vi 'y' send-keys -X copy-pipe-and-cancel 'pbcopy'

# Enable vi keys
setw -g mode-keys vi

# Use system clipboard via OSC52 (works over SSH too)
set -g set-clipboard on

# No delay between prefix and command
set -sg escape-time 0

# Start window and pane indices at 1
set -g base-index 1
setw -g pane-base-index 1

# Renumber windows when one is closed
set-option -g renumber-windows on

# Activity: highlight tab but no popup
setw -g monitor-activity on
set -g visual-activity off

# Mouse support
set -g mouse on

# Longer pane display time
set -g display-panes-time 2000

# Command / message line
set -g message-style fg=white,bg=black,bright

# Prefix: C-a
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Theme
set -g @plugin "janoamaral/tokyo-night-tmux"
set -g @tokyo-night-tmux_show_path 1
set -g @tokyo-night-tmux_show_music 1
set -g @tokyo-night-tmux_path_format relative
set -g @tokyo-night-tmux_window_id_style none
set -g @tokyo-night-tmux_pane_id_style dsquare
set -g @tokyo-night-tmux_zoom_id_style dsquare

# Resurrect: auto-session handles nvim restore on startup (no Session.vim needed)
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Default shell
set-option -g default-shell /bin/zsh

run '~/.config/tmux/plugins/tpm/tpm'
