# BEGIN_KITTY_THEME
# Tokyo Night Storm
include current-theme.conf
# END_KITTY_THEME

# ── Font ────────────────────────────────────────────────────────────────────
font_family      Liga SFMono Nerd Font
font_size        14
# font_family    FiraCode Nerd Font Mono

# ── Cursor ──────────────────────────────────────────────────────────────────
cursor_shape           block
cursor_blink_interval  0

# ── Scrollback ──────────────────────────────────────────────────────────────
scrollback_lines 10000

# ── Selection ───────────────────────────────────────────────────────────────
copy_on_select             yes
strip_trailing_spaces      smart

# ── URLs ────────────────────────────────────────────────────────────────────
detect_urls  yes
url_style    curly

# ── Window ──────────────────────────────────────────────────────────────────
window_padding_width        8
hide_window_decorations     titlebar-only

# ── macOS ───────────────────────────────────────────────────────────────────
# Pass Option key through to tmux/nvim (required for alt keybinds)
macos_option_as_alt  yes

# ── Shell integration ────────────────────────────────────────────────────────
# Enables marks, sudo handling, better ssh, and nvim cursor shape sync
shell_integration  enabled

# ── Remote control ──────────────────────────────────────────────────────────
allow_remote_control  yes
listen_on             unix:/tmp/kitty

# ── Claude Code ─────────────────────────────────────────────────────────────
# Shift+Enter → newline when window title contains "claude"
map --when-focus-on title:claude shift+enter send_text normal,application \x0a
